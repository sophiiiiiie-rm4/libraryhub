<div class="hero">
  <h2>Votre bibliothèque numérique</h2>
  <p>Découvrez, explorez et sauvegardez vos livres préférés</p>
  <div class="search-bar">
    <input type="text" [(ngModel)]="query" placeholder="Rechercher un titre ou auteur…" />
  </div>
</div>

<div class="categories">
  <button *ngFor="let c of categories" class="cat-btn"
    [class.active]="category === c" (click)="category = c">
    {{ c }}
  </button>
</div>

<main>
  <div class="section-header">
    <h2 class="section-title">{{ category === 'Toutes' ? 'Tous les livres' : category }}</h2>
    <span class="count-badge">{{ filtered.length }} livres</span>
  </div>

  <div *ngIf="filtered.length === 0" class="empty">
    <h3>Aucun résultat</h3>
    <p>Essayez un autre titre, auteur ou catégorie.</p>
  </div>

  <div class="books-grid">
    <app-book-card
      *ngFor="let b of filtered"
      [book]="b"
      [isFav]="favorites.has(b.id)"
      (selected)="bookSelected.emit($event)"
      (toggleFav)="favToggled.emit($event)">
    </app-book-card>
  </div>
</main>
